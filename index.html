    <style>
        /* CRITICAL CSS FOR LOADER - Prevents FOUC */
        .global-loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #0D0A1A;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 999999;
            transition: opacity 1s cubic-bezier(0.65, 0, 0.35, 1), visibility 1s;
            overflow: hidden;
        }

        .global-loader__bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at center, #1A1040 0%, #0D0A1A 70%);
            z-index: -1;
        }

        .global-loader__shimmer {
            position: absolute;
            top: -100%;
            left: -100%;
            width: 300%;
            height: 300%;
            background: linear-gradient(45deg,
                    rgba(167, 139, 250, 0) 0%,
                    rgba(167, 139, 250, 0.02) 45%,
                    rgba(167, 139, 250, 0.06) 50%,
                    rgba(167, 139, 250, 0.02) 55%,
                    rgba(167, 139, 250, 0) 100%);
            animation: loaderShimmer 5s infinite linear;
            pointer-events: none;
        }

        .global-loader__content {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
            position: relative;
        }

        .global-loader__logo-wrapper {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .global-loader__logo {
            width: 140px;
            height: 140px;
            object-fit: contain;
            filter: drop-shadow(0 0 30px rgba(167, 139, 250, 0.3));
            animation: loaderFloat 4s infinite ease-in-out;
            z-index: 2;
        }

        .global-loader__ring {
            position: absolute;
            width: 180px;
            height: 180px;
            border-radius: 50%;
            border: 1px solid rgba(167, 139, 250, 0.12);
            border-top-color: rgba(167, 139, 250, 0.6);
            animation: loaderSpin 2.5s infinite linear;
            z-index: 1;
        }

        @font-face {
            font-family: 'KH Interference';
            src: url('/assets/fonts/KHInterferenceTRIAL-Regular.ttf') format('truetype');
            font-weight: 400;
            font-style: normal;
            font-display: swap;
        }

        @font-face {
            font-family: 'KH Interference';
            src: url('/assets/fonts/KHInterferenceTRIAL-Bold.ttf') format('truetype');
            font-weight: 700;
            font-style: normal;
            font-display: swap;
        }

        .global-loader__text {
            font-family: "Space Grotesk", "KH Interference", sans-serif;
            font-size: 1.4rem;
            color: rgba(167, 139, 250, 0.7);
            letter-spacing: 0.35em;
            text-transform: uppercase;
            animation: loaderPulseText 2.5s infinite ease-in-out;
            margin-top: 10px;
        }

        @keyframes loaderShimmer {
            0% {
                transform: translate(-30%, -30%) rotate(0deg);
            }
            100% {
                transform: translate(0, 0) rotate(0deg);
            }
        }

        @keyframes loaderFloat {
            0%, 100% {
                transform: translateY(0) scale(1);
            }
            50% {
                transform: translateY(-8px) scale(1.01);
            }
        }

        @keyframes loaderSpin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes loaderPulseText {
            0%, 100% {
                opacity: 0.4;
            }
            50% {
                opacity: 0.9;
            }
        }

        .global-loader.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }
    </style>
</head>

<body>
    <!-- Global Loading Screen -->
    <div id="global-loader" class="global-loader">

        <div class="global-loader__shimmer"></div>
        <div class="global-loader__content">
